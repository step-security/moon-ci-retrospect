name: "Test"
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}
jobs:
  test:
    name: "Run Tests"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v7
        
      - name: "Setup Node.js"
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: "Install dependencies"
        run: npm install

      - name: "Typecheck"
        run: npm run typecheck
        
      - name: "Run tests"
        run: npm test
